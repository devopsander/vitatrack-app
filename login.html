<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VitaTrack - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Google Sign-In -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        body {
            background-color: var(--bg-color);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            /* subtle animation */
            animation: fadeIn 0.5s ease-out;
        }
    </style>
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="auth-header">
                <i data-lucide="activity" class="auth-logo"></i>
                <h2>Bem-vindo ao VitaTrack</h2>
                <p>Faça login ou cadastre-se para continuar</p>
            </div>
            
            <div class="auth-tabs">
                <button class="auth-tab active" data-tab="login">Entrar</button>
                <button class="auth-tab" data-tab="register">Cadastrar</button>
            </div>

            <form id="form-login" class="auth-form active">
                <div class="form-group">
                    <label>E-mail</label>
                    <input type="email" id="login-email" required>
                </div>
                <div class="form-group">
                    <label>Senha</label>
                    <input type="password" id="login-password" required>
                </div>
                <button type="submit" class="btn-primary">Entrar</button>
                <div id="login-error" style="color:#ef4444; font-size:0.8rem; margin-top:0.5rem; text-align:center;"></div>
            </form>

            <form id="form-register" class="auth-form hidden">
                <div class="form-group">
                    <label>Nome</label>
                    <input type="text" id="reg-name" required>
                </div>
                <div class="form-group">
                    <label>E-mail</label>
                    <input type="email" id="reg-email" required>
                </div>
                <div class="form-group">
                    <label>Senha</label>
                    <input type="password" id="reg-password" required>
                </div>
                <button type="submit" class="btn-primary">Criar Conta</button>
                <div id="reg-error" style="color:#ef4444; font-size:0.8rem; margin-top:0.5rem; text-align:center;"></div>
            </form>

            <div class="auth-divider">
                <span>ou</span>
            </div>

            <div id="google-btn-container" style="display: flex; justify-content: center; margin-top: 1rem;">
                <button id="google-btn-custom" class="btn-ai" style="width: 100%; max-width: 300px; background: white; color: var(--text-primary); border: 1px solid var(--border-color);">
                    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google" style="width: 18px; margin-right: 10px;">
                    Entrar com Google
                </button>
            </div>
        </div>
    </div>

    <script type="module">
        import { auth, db } from './firebase-config.js';
        import { 
            signInWithEmailAndPassword, 
            createUserWithEmailAndPassword, 
            signInWithPopup, 
            GoogleAuthProvider 
        } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import store from './store.js';

        lucide.createIcons();

        document.addEventListener('DOMContentLoaded', () => {
            const tabs = document.querySelectorAll('.auth-tab');
            const loginForm = document.getElementById('form-login');
            const regForm = document.getElementById('form-register');
            const googleBtn = document.getElementById('google-btn-custom');

            // Wait for store to check current session
            store.onUserLoaded = (user) => {
                if (user) window.location.href = 'index.html';
            };

            tabs.forEach(tab => {
                tab.addEventListener('click', () => {
                    tabs.forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');
                    if (tab.dataset.tab === 'login') {
                        loginForm.classList.remove('hidden');
                        regForm.classList.add('hidden');
                    } else {
                        loginForm.classList.add('hidden');
                        regForm.classList.remove('hidden');
                    }
                });
            });

            loginForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                const errEl = document.getElementById('login-error');
                errEl.textContent = '';
                const email = document.getElementById('login-email').value;
                const pass = document.getElementById('login-password').value;

                try {
                    await signInWithEmailAndPassword(auth, email, pass);
                    window.location.href = 'index.html';
                } catch (err) {
                    errEl.textContent = "Erro ao entrar: " + err.message;
                }
            });

            regForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                const errEl = document.getElementById('reg-error');
                errEl.textContent = '';
                const name = document.getElementById('reg-name').value;
                const email = document.getElementById('reg-email').value;
                const pass = document.getElementById('reg-password').value;

                try {
                    const userCredential = await createUserWithEmailAndPassword(auth, email, pass);
                    const user = userCredential.user;
                    
                    // Create initial profile in Firestore
                    await setDoc(doc(db, 'users', email), {
                        profile: {
                            name: name,
                            goalType: 'lose',
                            goalWeight: 75,
                            height: 170,
                            goalCalories: 2000,
                            goalProtein: 150,
                            goalCarbs: 200,
                            goalFat: 60,
                        },
                        weightHistory: [],
                        meals: {},
                        messages: []
                    });

                    window.location.href = 'index.html';
                } catch (err) {
                    errEl.textContent = "Erro ao cadastrar: " + err.message;
                }
            });

            googleBtn.addEventListener('click', async () => {
                const provider = new GoogleAuthProvider();
                try {
                    const result = await signInWithPopup(auth, provider);
                    const user = result.user;

                    // Check if user exists in Firestore, if not create
                    const userDoc = await getDoc(doc(db, 'users', user.email));
                    if (!userDoc.exists()) {
                        await setDoc(doc(db, 'users', user.email), {
                            profile: {
                                name: user.displayName,
                                picture: user.photoURL,
                                goalType: 'lose',
                                goalWeight: 75,
                                height: 170,
                                goalCalories: 2000,
                                goalProtein: 150,
                                goalCarbs: 200,
                                goalFat: 60,
                            },
                            weightHistory: [],
                            meals: {},
                            messages: []
                        });
                    }
                    window.location.href = 'index.html';
                } catch (err) {
                    console.error("Google login error", err);
                    alert("Erro no login com Google: " + err.message);
                }
            });
        });
    </script>
</body>
</html>
